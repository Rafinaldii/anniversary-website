<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Anniversary 💗</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #ffe6f0, #ffd6eb, #ffc2e0);
        background-size: 400% 400%;
        animation: gradientMove 15s ease infinite;
        color: #5c0033;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .top-bar {
        padding: 20px 8%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .back-btn,
      .music-toggle {
        text-decoration: none;
        background: white;
        padding: 8px 18px;
        border-radius: 30px;
        font-size: 0.85rem;
        color: #ff1493;
        font-weight: 500;
        border: none;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(255, 20, 147, 0.2);
        transition: 0.3s;
      }

      .back-btn:hover,
      .music-toggle:hover {
        background: #ff1493;
        color: white;
      }

      header {
        text-align: center;
        padding: 20px 20px 50px 20px;
      }

      header h1 {
        font-family: "Playfair Display", serif;
        font-size: 2.8rem;
      }

      /* GRID 4 COLUMN */
      .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
        padding: 0 8% 80px 8%;
      }

      /* RATIO 4:3 TEMPLATE */
      .photo-wrapper {
        width: 100%;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        transition: 0.4s ease;
      }

      .photo-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.4s ease;
      }

      .photo-wrapper:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 50px rgba(255, 20, 147, 0.35);
      }

      /* RESPONSIVE */
      @media (max-width: 1000px) {
        .gallery {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        .gallery {
          grid-template-columns: 1fr;
        }
      }

      footer {
        text-align: center;
        padding: 40px 20px;
        font-size: 0.9rem;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>

    <div class="top-bar">
      <a href="home.html" class="back-btn">⬅ Back Home</a>
    </div>

    <header>
      <h1>Recap kita berdua 💗</h1>
